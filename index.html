<!DOCTYPE html>
<html lang="en">
<head>

    <title>GhostAtharv | IIITM Gwalior</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0f172a;

            align-items: center;

        .card { 
            background: #1e293b;

        }
        h1 { color: #38bdf8; margin: 0; font-size: 2.5rem; }
        p { color: #94a3b8; font-size: 1.1rem; }
        .badge {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>GhostAtharv</h1>
        <p>Incoming Student @ <strong>IIITM Gwalior</strong></p>
        <p>BTech + MTech (Integrated)</p>
